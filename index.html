<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 3關程式碼挑戰系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b1329;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #ffd43b; /* Python 經典黃 */
            --accent-glow: rgba(255, 212, 59, 0.4);
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        
        body { 
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            overflow-x: hidden;
        }

        /* 主容器 - 磨砂玻璃效果 */
        .container { 
            background: var(--card-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 850px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative; 
        }

        .nav-btn { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text-color); 
            padding: 8px 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-family: sans-serif; 
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        .nav-btn:hover { background: var(--accent-color); color: #000; box-shadow: 0 0 15px var(--accent-glow); border-color: var(--accent-color); }
        
        h2 { text-align: center; margin-bottom: 25px; font-weight: 600; font-family: sans-serif; letter-spacing: 1px; color: #fff;}
        .page { display: none; }
        .page.active { display: block; }

        /* 儀表板與進度條 */
        .dashboard { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; text-align: center; font-family: sans-serif; }
        .dash-item { font-size: 14px; color: var(--text-muted); }
        .dash-value { font-size: 36px; color: var(--text-color); font-weight: bold; margin-top: 5px; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        .progress-box { text-align: center; color: var(--accent-color); font-size: 18px; font-weight: bold; margin-bottom: 15px; font-family: sans-serif; text-shadow: 0 0 8px var(--accent-glow); }

        /* 表單與按鈕 */
        .form-group { text-align: center; margin: 20px 0; font-family: sans-serif; }
        select, input { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 14px; font-size: 16px; border-radius: 8px; width: 100%; max-width: 280px; text-align: center; outline: none; transition: all 0.3s; }
        select:focus, input:focus { border-color: var(--accent-color); box-shadow: 0 0 10px var(--accent-glow); }
        
        button.btn { background: linear-gradient(135deg, #ffd43b, #ffa500); color: #000; border: none; padding: 14px 35px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; display: block; margin: 25px auto 0; font-family: sans-serif; box-shadow: 0 5px 15px rgba(255, 212, 59, 0.3); transition: all 0.3s; }
        button.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255, 212, 59, 0.5); }
        
        /* 打字區域 */
        .word-display { 
            font-size: 20px; 
            color: #475569; 
            line-height: 1.6; 
            margin-bottom: 25px; 
            letter-spacing: 1px; 
            word-wrap: break-word; 
            min-height: 80px; 
            white-space: pre-wrap;
            background: rgba(15, 23, 42, 0.8);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--accent-color);
            user-select: none; -webkit-user-select: none; -moz-user-select: none;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }
        .word-display span.correct { color: #4ade80; text-shadow: 0 0 8px rgba(74, 222, 128, 0.4); } 
        .word-display span.current { background-color: rgba(255, 212, 59, 0.3); color: var(--text-color); border-radius: 2px; }
        
        .input-field { width: 100%; max-width: 100%; background: transparent; border: none; border-bottom: 2px solid #334155; border-radius: 0; padding: 10px 0; font-size: 22px; text-align: left; color: #fff; outline: none; transition: border-color 0.3s; }
        .input-field:focus { border-color: var(--accent-color); }
        
        /* 圖表與後台列表 */
        .chart-container { width: 100%; height: 120px; margin-top: 30px; }
        .admin-chart-container { width: 100%; height: 250px; margin-top: 20px; display: none; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); font-family: sans-serif; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: sans-serif; }
        th, td { padding: 14px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--text-muted); font-weight: normal; }
        tbody tr { cursor: pointer; transition: background 0.2s; }
        tbody tr:hover { background: rgba(255,255,255,0.03); }

        /* ✨ 核心：全螢幕磨砂玻璃覆蓋層 (CORS / 密碼 / 通關通用) */
        .glass-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 15, 30, 0.7); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .glass-overlay.active { opacity: 1; pointer-events: auto; }
        
        /* 玻璃面板字卡 */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.05);
            padding: 35px 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-overlay.active .glass-card { transform: scale(1); }
        
        /* 密碼卡片專屬發光霓虹邊框 */
        .password-style { border-color: rgba(56, 189, 248, 0.4); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(56, 189, 248, 0.15); }
        .password-style .glass-title { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
        
        .glass-title { font-size: 24px; color: var(--accent-color); margin-bottom: 18px; font-family: sans-serif; text-shadow: 0 0 10px rgba(255, 212, 59, 0.4); }
        .glass-msg { font-size: 15px; color: #cbd5e1; line-height: 1.6; margin-bottom: 25px; font-family: sans-serif; }
        
        .glass-btn {
            background: linear-gradient(135deg, #ffd43b, #ffb800);
            color: #000; border: none; padding: 12px 30px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 212, 59, 0.3); transition: all 0.2s; font-family: sans-serif; display: inline-block; margin: 5px;
        }
        .glass-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 212, 59, 0.5); }
        .glass-btn.btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); box-shadow: none; }
        .glass-btn.btn-secondary:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="glass-overlay" id="glassAlert">
    <div class="glass-card">
        <div class="glass-title" id="glassTitle">系統提示</div>
        <div class="glass-msg" id="glassMsg">內容載入中...</div>
        <button class="glass-btn" onclick="closeGlassAlert()">確認</button>
    </div>
</div>

<div class="glass-overlay" id="glassPasswordOverlay">
    <div class="glass-card password-style">
        <div class="glass-title">安全身分驗證</div>
        <div class="glass-msg">請在下方輸入後台管理密碼以進入系統：</div>
        <div class="form-group">
            <input type="password" id="adminPasswordInput" placeholder="請輸入管理密碼..." style="max-width: 100%; margin-bottom: 20px;">
        </div>
        <div style="display: flex; justify-content: center; gap: 10px;">
            <button class="glass-btn btn-secondary" onclick="closePasswordPanel()">取消</button>
            <button class="glass-btn" onclick="submitAdminPassword()" style="background: linear-gradient(135deg, #38bdf8, #0284c7); color:#fff; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);">登入</button>
        </div>
    </div>
</div>

<div class="container">
    <button class="nav-btn" id="toggleModeBtn" onclick="openPasswordPanel()">切換至後台</button>

    <div id="loginPage" class="page active">
        <h2>選擇座號 (1-29 號) 連續 Python 測試</h2>
        <div class="form-group">
            <select id="seatNumber"></select>
            <button class="btn" onclick="startTest()">開始 3 關挑戰測試</button>
        </div>
    </div>

    <div id="testPage" class="page">
        <div class="progress-box" id="progressDisplay">目前關卡: 1 / 3</div>
        <div class="dashboard">
            <div class="dash-item">本關 WPM<div class="dash-value" id="liveWpm">0</div></div>
            <div class="dash-item">精確度<div class="dash-value" id="liveAcc">100%</div></div>
            <div class="dash-item">本關時間<div class="dash-value" id="timer">0</div></div>
        </div>
        <div class="word-display" id="sentenceDisplay"></div>
        <input type="text" id="typingInput" class="input-field" placeholder="在此輸入上方小寫 python 程式碼..." autocomplete="off" disabled>
        
        <div class="chart-container">
            <canvas id="liveChart"></canvas>
        </div>
    </div>

    <div id="adminPage" class="page">
        <h2>班級 Python 3 關挑戰紀錄後台</h2>
        <div style="text-align: center;">
            <button class="btn" onclick="fetchAdminData()" style="display:inline-block; margin:0 10px;">重新整理數據</button>
        </div>
        
        <div class="admin-chart-container" id="adminChartBox">
            <h4 id="chartTitle" style="text-align:center; margin-bottom:10px; color:var(--accent-color);">點擊下方學生欄位播放演示圖</h4>
            <canvas id="adminPlaybackChart"></canvas>
        </div>

        <table>
            <thead>
                <tr>
                    <th>測試時間</th>
                    <th>座號</th>
                    <th>該關速度 (WPM)</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                <tr><td colspan="3">請點選重新整理數據</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ 請務必確認此處為後端發布「新版本」後產生的正確 /exec 網址
    const API_URL = "https://script.google.com/macros/s/AKfycby-bdiAGG2_A_TZ0dWfrgHjp897GweIJutityOlBOl9Nz7W7UPCF4FM3AWez9IP8dij/exec"; 

    // 3關專屬 Python 題目庫
    const sentences = [
        "print('hello python')",
        "for i in range(10): print(i)",
        "items = [1, 2, 3]; items.append(4)"
    ];

    let currentLevel = 0; let currentSeatNumber = ""; let targetSentence = "";
    let startTime = null; let timerInterval = null; let isTestActive = false;
    let speedHistory = []; let secondsElapsed = 0;
    let liveChart = null; let playbackChart = null; let playbackInterval = null;
    let globalAdminData = []; let glassCallback = null;

    // 初始化 1-29 座號
    const seatSelect = document.getElementById('seatNumber');
    for(let i = 1; i <= 29; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.textContent = i + " 號";
        seatSelect.appendChild(opt);
    }

    // 核心控制：控制系統訊息磨砂面板
    function openGlassAlert(title, message, callback = null) {
        document.getElementById('glassTitle').textContent = title;
        document.getElementById('glassMsg').textContent = message;
        glassCallback = callback;
        document.getElementById('glassAlert').classList.add('active');
    }
    function closeGlassAlert() {
        document.getElementById('glassAlert').classList.remove('active');
        if (glassCallback) { glassCallback(); glassCallback = null; }
    }

    // 核心控制：控制密碼輸入磨砂面板
    function openPasswordPanel() {
        const btn = document.getElementById('toggleModeBtn');
        if (btn.textContent === "切換至後台") {
            document.getElementById('adminPasswordInput').value = "";
            document.getElementById('glassPasswordOverlay').classList.add('active');
            setTimeout(() => document.getElementById('adminPasswordInput').focus(), 200);
        } else {
            btn.textContent = "切換至後台";
            resetTestSystem();
            showPage('loginPage');
        }
    }
    function closePasswordPanel() {
        document.getElementById('glassPasswordOverlay').classList.remove('active');
    }

    // 送出後台驗證密碼
    function submitAdminPassword() {
        const pass = document.getElementById('adminPasswordInput').value;
        if (!pass) return;

        closePasswordPanel();

        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: "checkPassword", password: pass }),
            headers: { "Content-Type": "text/plain" }
        })
        .then(res => res.text()) 
        .then(text => {
            const data = JSON.parse(text);
            if (data.status === "success") {
                openGlassAlert("驗證成功", "身分核對正確，正在進入後台讀取資料...", function() {
                    document.getElementById('toggleModeBtn').textContent = "返回測試";
                    showPage('adminPage');
                    fetchAdminData();
                });
            } else {
                openGlassAlert("驗證失敗", "您輸入的管理密碼不正確，請重新確認。");
            }
        }).catch(() => {
            openGlassAlert("CORS 政策封鎖 / 連線失敗", "後端 Google 應用程式可能未正確發布、或未將權限改為「所有人(Anyone)」。請檢查主控台。");
        });
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function startTest() {
        currentSeatNumber = seatSelect.value;
        currentLevel = 0; 
        showPage('testPage');
        initLiveChart();
        loadLevel();
        
        const inputField = document.getElementById('typingInput');
        inputField.addEventListener('paste', function(e) { e.preventDefault(); openGlassAlert("操作受限", "為確保練習成效，系統禁止在此處直接貼上程式碼！"); });
        inputField.addEventListener('copy', function(e) { e.preventDefault(); });
        inputField.addEventListener('drop', function(e) { e.preventDefault(); });
    }

    function loadLevel() {
        document.getElementById('progressDisplay').textContent = `目前關卡: ${currentLevel + 1} / ${sentences.length}`;
        targetSentence = sentences[currentLevel];
        renderText("");
        
        const inputField = document.getElementById('typingInput');
        inputField.value = ""; inputField.disabled = false; inputField.focus();
        
        speedHistory = [0]; secondsElapsed = 0; isTestActive = false;
        clearInterval(timerInterval);
        document.getElementById('timer').textContent = "0";
        document.getElementById('liveWpm').textContent = "0";
        document.getElementById('liveAcc').textContent = "100%";
        initLiveChart();
    }

    function renderText(inputVal) {
        const display = document.getElementById('sentenceDisplay');
        display.innerHTML = "";
        for (let i = 0; i < targetSentence.length; i++) {
            let span = document.createElement('span');
            if (i < inputVal.length) {
                if (inputVal[i] === targetSentence[i]) {
                    span.classList.add('correct');
                } else {
                    span.style.color = '#f87171';
                    span.style.backgroundColor = 'rgba(248,113,113,0.15)';
                }
            } else if (i === inputVal.length) {
                span.classList.add('current');
            }
            span.textContent = targetSentence[i];
            display.appendChild(span);
        }
    }

    function handleTyping() {
        const inputField = document.getElementById('typingInput');
        const inputVal = inputField.value;
        renderText(inputVal);

        if (!isTestActive && inputVal.length > 0) {
            isTestActive = true;
            startTime = new Date();
            timerInterval = setInterval(updateStats, 1000);
        }

        if (inputVal === targetSentence) {
            clearInterval(timerInterval);
            inputField.disabled = true;
            let finalTime = (new Date() - startTime) / 1000 / 60;
            let finalWpm = Math.round((targetSentence.length / 5) / finalTime) || 0;
            
            submitScore(currentSeatNumber, finalWpm, speedHistory);

            if (currentLevel < sentences.length - 1) {
                currentLevel++;
                setTimeout(loadLevel, 600); 
            } else {
                openGlassAlert(
                    "🎉 全數挑戰成功！", 
                    `恭喜「使用者」完成 3 關 Python 脈絡打字測試！所有即時數據已成功封包並上傳後台試算表。`, 
                    function() {
                        resetTestSystem();
                        showPage('loginPage');
                    }
                );
            }
        }
    }

    document.getElementById('typingInput').addEventListener('input', handleTyping);

    function updateStats() {
        secondsElapsed++;
        const inputVal = document.getElementById('typingInput').value;
        let timeElapsedMin = secondsElapsed / 60;
        
        let wpm = Math.round((inputVal.length / 5) / timeElapsedMin) || 0;
        document.getElementById('liveWpm').textContent = wpm;
        document.getElementById('timer').textContent = secondsElapsed;

        let correctChars = 0;
        for(let i=0; i<inputVal.length; i++) {
            if(inputVal[i] === targetSentence[i]) correctChars++;
        }
        let acc = inputVal.length > 0 ? Math.round((correctChars / inputVal.length) * 100) : 100;
        document.getElementById('liveAcc').textContent = acc + "%";

        speedHistory.push(wpm);
        liveChart.data.labels.push(secondsElapsed);
        liveChart.data.datasets[0].data.push(wpm);
        liveChart.update();
    }

    function initLiveChart() {
        if(liveChart) liveChart.destroy();
        const ctx = document.getElementById('liveChart').getContext('2d');
        liveChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [0], datasets: [{ data: [0], borderColor: '#ffd43b', borderWidth: 2, tension: 0.3, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function submitScore(seat, wpm, history) {
        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ number: seat, wpm: wpm, history: history }),
            headers: { "Content-Type": "text/plain" }
        })
        .then(res => res.text())
        .catch(() => console.log("連線佇列重試中..."));
    }

    function resetTestSystem() {
        clearInterval(timerInterval);
        if(liveChart) liveChart.destroy();
    }

    // ================= 後台核心數據處理 =================

    function fetchAdminData() {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = `<tr><td colspan="3">正在即時讀取最新資料庫...</td></tr>`;

        fetch(API_URL)
        .then(res => res.text())
        .then(text => {
            const data = JSON.parse(text);
            globalAdminData = data; 
            tbody.innerHTML = "";
            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3">目前資料庫尚無任何學生成績紀錄。</td></tr>`;
                return;
            }
            let displayData = [...data].reverse();
            displayData.forEach((row, index) => {
                let tr = document.createElement('tr');
                let originalIndex = data.length - 1 - index;
                tr.onclick = () => playStudentDemo(originalIndex); 
                tr.innerHTML = `
                    <td>${row.timestamp}</td>
                    <td>${row.number} 號</td>
                    <td style="color:#ffd43b; font-weight:bold;">${row.wpm} WPM</td>
                `;
                tbody.appendChild(tr);
            });
        }).catch(() => {
            tbody.innerHTML = `<tr><td colspan="3" style="color:#f87171;">讀取失敗。請檢查您的 Apps Script 是否再次更新但忘了發布「新版本」？</td></tr>`;
        });
    }

    function playStudentDemo(index) {
        clearInterval(playbackInterval);
        document.getElementById('adminChartBox').style.display = "block";
        const student = globalAdminData[index];
        document.getElementById('chartTitle').textContent = `${student.number} 號同學 速度脈絡重建模擬 (最終成績：${student.wpm} WPM)`;
        const historyData = student.history || [0];
        
        if(playbackChart) playbackChart.destroy();
        const ctx = document.getElementById('adminPlaybackChart').getContext('2d');
        playbackChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [0], datasets: [{ label: '即時 WPM', data: [0], borderColor: '#ffd43b', backgroundColor: 'rgba(255, 212, 59, 0.05)', fill: true, tension: 0.2 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 120 } } }
        });

        let currentTick = 1;
        playbackInterval = setInterval(() => {
            if (currentTick < historyData.length) {
                playbackChart.data.labels.push(currentTick + "秒");
                playbackChart.data.datasets[0].data.push(historyData[currentTick]);
                playbackChart.update();
                currentTick++;
            } else {
                clearInterval(playbackInterval);
            }
        }, 300); 
    }
</script>
</body>
</html>
