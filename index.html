<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python 程式碼 3 關打字測試系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #ffd43b; /* Python 經典黃 */
            --text-color: #f8fafc;
            --text-muted: #64748b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', Courier, monospace; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; overflow-x: hidden;}
        .container { background: var(--card-bg); padding: 40px; border-radius: 12px; width: 100%; max-width: 850px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); position: relative; }
        .nav-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: var(--text-color); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-family: sans-serif; }
        .nav-btn:hover { background: var(--accent-color); color: #000; }
        
        h2 { text-align: center; margin-bottom: 25px; font-weight: 400; font-family: sans-serif; }
        .page { display: none; }
        .page.active { display: block; }

        /* 儀表板與進度條 */
        .dashboard { display: flex; justify-content: center; gap: 40px; margin-bottom: 20px; text-align: center; font-family: sans-serif; }
        .dash-item { font-size: 14px; color: var(--text-muted); }
        .dash-value { font-size: 36px; color: var(--text-color); font-weight: bold; margin-top: 5px; }
        
        .progress-box { text-align: center; color: var(--accent-color); font-size: 18px; font-weight: bold; margin-bottom: 15px; font-family: sans-serif; }

        /* 表單與按鈕 */
        .form-group { text-align: center; margin: 20px 0; font-family: sans-serif; }
        select, input { background: #334155; border: 1px solid #475569; color: #fff; padding: 12px; font-size: 16px; border-radius: 6px; width: 100%; max-width: 250px; text-align: center; outline: none; }
        button.btn { background: var(--accent-color); color: #000; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; display: block; margin: 20px auto 0; font-family: sans-serif; }
        
        /* 打字區域 */
        .word-display { 
            font-size: 20px; 
            color: var(--text-muted); 
            line-height: 1.6; 
            margin-bottom: 25px; 
            letter-spacing: 1px; 
            word-wrap: break-word; 
            min-height: 80px; 
            white-space: pre-wrap;
            background: #090d16;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            user-select: none; 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        .word-display span.correct { color: #4ade80; } 
        .word-display span.current { background-color: rgba(255, 212, 59, 0.3); color: var(--text-color); }
        .input-field { width: 100%; max-width: 100%; background: transparent; border: none; border-bottom: 2px solid #334155; border-radius: 0; padding: 10px 0; font-size: 22px; text-align: left; color: #fff; outline: none;}
        .input-field:focus { border-color: var(--accent-color); }
        
        /* 圖表與後台 */
        .chart-container { width: 100%; height: 120px; margin-top: 30px; }
        .admin-chart-container { width: 100%; height: 250px; margin-top: 20px; display: none; background: rgba(0,0,0,0.1); padding: 15px; border-radius: 8px; font-family: sans-serif; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-family: sans-serif; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #334155; }
        th { color: var(--text-muted); font-weight: normal; }
        tbody tr { cursor: pointer; }
        tbody tr:hover { background: rgba(255,255,255,0.05); }

        /* ✨ 核心：玻璃流光面板樣式 (Glassmorphism) */
        .glass-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6); /* 暗色半透明底 */
            backdrop-filter: blur(10px); /* 磨砂玻璃特效 */
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .glass-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 212, 59, 0.3); /* 黃色半透明邊框 */
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(255, 212, 59, 0.1);
            padding: 35px 50px;
            border-radius: 16px;
            width: 90%;
            max-width: 480px;
            text-align: center;
            transform: scale(0.85);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .glass-overlay.active .glass-card {
            transform: scale(1);
        }
        .glass-title {
            font-size: 24px;
            color: var(--accent-color);
            margin-bottom: 15px;
            font-family: sans-serif;
            text-shadow: 0 0 10px rgba(255, 212, 59, 0.5);
        }
        .glass-msg {
            font-size: 16px;
            color: #e2e8f0;
            line-height: 1.6;
            margin-bottom: 25px;
            font-family: sans-serif;
        }
        .glass-btn {
            background: linear-gradient(135deg, #ffd43b, #ffb800);
            color: #000;
            border: none;
            padding: 10px 30px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 212, 59, 0.4);
            transition: background 0.2s, transform 0.1s;
            font-family: sans-serif;
            display: inline-block;
        }
        .glass-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 212, 59, 0.6); }
        .glass-btn:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="glass-overlay" id="glassAlert">
    <div class="glass-card">
        <div class="glass-title" id="glassTitle">系統提示</div>
        <div class="glass-msg" id="glassMsg">這是內容訊息。</div>
        <button class="glass-btn" id="glassBtn" onclick="closeGlassAlert()">確認</button>
    </div>
</div>

<div class="container">
    <button class="nav-btn" id="toggleModeBtn" onclick="handleNavClick()">切換至後台</button>

    <div id="loginPage" class="page active">
        <h2> Python 測試</h2>
        <div class="form-group">
            <select id="seatNumber"></select>
            <button class="btn" onclick="startTest()">開始 3 關挑戰測試</button>
        </div>
    </div>

    <div id="testPage" class="page">
        <div class="progress-box" id="progressDisplay">目前關卡: 1 / 3</div>
        <div class="dashboard">
            <div class="dash-item">本關 WPM<div class="dash-value" id="liveWpm">0</div></div>
            <div class="dash-item">精確度<div class="dash-value" id="liveAcc">100%</div></div>
            <div class="dash-item">本關時間<div class="dash-value" id="timer">0</div></div>
        </div>
        <div class="word-display" id="sentenceDisplay"></div>
        <input type="text" id="typingInput" class="input-field" placeholder="在此輸入上方小寫 python 程式碼..." autocomplete="off" disabled>
        
        <div class="chart-container">
            <canvas id="liveChart"></canvas>
        </div>
    </div>

    <div id="adminPage" class="page">
        <h2>班級 Python 3 關挑戰紀錄後台</h2>
        <div style="text-align: center;">
            <button class="btn" onclick="fetchAdminData()" style="display:inline-block; margin:0 10px;">重新整理數據</button>
        </div>
        
        <div class="admin-chart-container" id="adminChartBox">
            <h4 id="chartTitle" style="text-align:center; margin-bottom:10px; color:var(--accent-color);">點擊下方學生欄位播放演示圖</h4>
            <canvas id="adminPlaybackChart"></canvas>
        </div>

        <table>
            <thead>
                <tr>
                    <th>測試時間</th>
                    <th>座號</th>
                    <th>該關速度 (WPM)</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                <tr><td colspan="3">請點選重新整理數據</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // ⚠️ 請更換成您正確的 Apps Script 網址
    const API_URL = "https://script.google.com/macros/s/AKfycby-bdiAGG2_A_TZ0dWfrgHjp897GweIJutityOlBOl9Nz7W7UPCF4FM3AWez9IP8dij/exec"; 

    // 精確 3 關題目
    const sentences = [
        "print('hello python')",
        "for i in range(10): print(i)",
        "items = [1, 2, 3]; items.append(4)"
    ];

    let currentLevel = 0; 
    let currentSeatNumber = "";
    let targetSentence = "";
    let startTime = null;
    let timerInterval = null;
    let isTestActive = false;
    
    let speedHistory = []; 
    let secondsElapsed = 0;

    let liveChart = null;
    let playbackChart = null;
    let playbackInterval = null;
    let globalAdminData = [];
    let glassCallback = null; // 紀錄玻璃面板按鈕按下去之後要執行的動作

    // 初始化座號
    const seatSelect = document.getElementById('seatNumber');
    for(let i = 1; i <= 29; i++) {
        let opt = document.createElement('option');
        opt.value = i; opt.textContent = i + " 號";
        seatSelect.appendChild(opt);
    }

    // 呼叫玻璃面板提示框的函式
    function openGlassAlert(title, message, callback = null) {
        document.getElementById('glassTitle').textContent = title;
        document.getElementById('glassMsg').textContent = message;
        glassCallback = callback;
        document.getElementById('glassAlert').classList.add('active');
    }

    function closeGlassAlert() {
        document.getElementById('glassAlert').classList.remove('active');
        if (glassCallback) {
            glassCallback();
            glassCallback = null;
        }
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // 後台登入驗證
    function handleNavClick() {
        const btn = document.getElementById('toggleModeBtn');
        if (btn.textContent === "切換至後台") {
            let pass = prompt("請輸入後台管理密碼：");
            if (!pass) return;

            fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "checkPassword", password: pass }),
                headers: { "Content-Type": "text/plain" }
            })
            .then(res => res.text()) 
            .then(text => {
                const data = JSON.parse(text);
                if (data.status === "success") {
                    openGlassAlert("驗證成功", "已成功登入管理後台！", function() {
                        btn.textContent = "返回測試";
                        showPage('adminPage');
                        fetchAdminData();
                    });
                } else {
                    openGlassAlert("驗證失敗", "密碼輸入錯誤，拒絕存取。");
                }
            }).catch(() => {
                openGlassAlert("網路通訊失敗", "請確認後端 Google 應用程式是否發布成功。");
            });
        } else {
            btn.textContent = "切換至後台";
            resetTestSystem();
            showPage('loginPage');
        }
    }

    function startTest() {
        currentSeatNumber = seatSelect.value;
        currentLevel = 0; 
        showPage('testPage');
        initLiveChart();
        loadLevel();
        
        const inputField = document.getElementById('typingInput');
        inputField.addEventListener('paste', function(e) { e.preventDefault(); openGlassAlert("安全警告", "系統偵測到複製行為，此處禁止直接貼上程式碼！"); });
        inputField.addEventListener('copy', function(e) { e.preventDefault(); });
        inputField.addEventListener('drop', function(e) { e.preventDefault(); });
    }

    function loadLevel() {
        document.getElementById('progressDisplay').textContent = `目前關卡: ${currentLevel + 1} / ${sentences.length}`;
        targetSentence = sentences[currentLevel];
        renderText("");
        
        const inputField = document.getElementById('typingInput');
        inputField.value = "";
        inputField.disabled = false;
        inputField.focus();
        
        speedHistory = [0];
        secondsElapsed = 0;
        isTestActive = false;
        clearInterval(timerInterval);
        document.getElementById('timer').textContent = "0";
        document.getElementById('liveWpm').textContent = "0";
        document.getElementById('liveAcc').textContent = "100%";
        
        initLiveChart();
    }

    function renderText(inputVal) {
        const display = document.getElementById('sentenceDisplay');
        display.innerHTML = "";
        for (let i = 0; i < targetSentence.length; i++) {
            let span = document.createElement('span');
            if (i < inputVal.length) {
                if (inputVal[i] === targetSentence[i]) {
                    span.classList.add('correct');
                } else {
                    span.style.color = '#f87171';
                    span.style.backgroundColor = 'rgba(248,113,113,0.1)';
                }
            } else if (i === inputVal.length) {
                span.classList.add('current');
            }
            span.textContent = targetSentence[i];
            display.appendChild(span);
        }
    }

    function handleTyping() {
        const inputField = document.getElementById('typingInput');
        const inputVal = inputField.value;
        
        renderText(inputVal);

        if (!isTestActive && inputVal.length > 0) {
            isTestActive = true;
            startTime = new Date();
            timerInterval = setInterval(updateStats, 1000);
        }

        // 當前關卡順利打完
        if (inputVal === targetSentence) {
            clearInterval(timerInterval);
            inputField.disabled = true;
            let finalTime = (new Date() - startTime) / 1000 / 60;
            let finalWpm = Math.round((targetSentence.length / 5) / finalTime) || 0;
            
            submitScore(currentSeatNumber, finalWpm, speedHistory);

            if (currentLevel < sentences.length - 1) {
                currentLevel++;
                setTimeout(loadLevel, 600); 
            } else {
                // 3 關打完，跳出客製化玻璃葉面，按下確認後返回首頁
                openGlassAlert(
                    "🎉 挑戰成功！", 
                    `恭喜完成全數 3 關 Python 程式碼測試！成績與速度已同步上傳至老師的試算表。`, 
                    function() {
                        resetTestSystem();
                        showPage('loginPage');
                    }
                );
            }
        }
    }

    document.getElementById('typingInput').addEventListener('input', handleTyping);

    function updateStats() {
        secondsElapsed++;
        const inputVal = document.getElementById('typingInput').value;
        let timeElapsedMin = secondsElapsed / 60;
        
        let wpm = Math.round((inputVal.length / 5) / timeElapsedMin) || 0;
        document.getElementById('liveWpm').textContent = wpm;
        document.getElementById('timer').textContent = secondsElapsed;

        let correctChars = 0;
        for(let i=0; i<inputVal.length; i++) {
            if(inputVal[i] === targetSentence[i]) correctChars++;
        }
        let acc = inputVal.length > 0 ? Math.round((correctChars / inputVal.length) * 100) : 100;
        document.getElementById('liveAcc').textContent = acc + "%";

        speedHistory.push(wpm);
        liveChart.data.labels.push(secondsElapsed);
        liveChart.data.datasets[0].data.push(wpm);
        liveChart.update();
    }

    function initLiveChart() {
        if(liveChart) liveChart.destroy();
        const ctx = document.getElementById('liveChart').getContext('2d');
        liveChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [0], datasets: [{ data: [0], borderColor: '#ffd43b', borderWidth: 2, tension: 0.3, pointRadius: 0 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
        });
    }

    function submitScore(seat, wpm, history) {
        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ number: seat, wpm: wpm, history: history }),
            headers: { "Content-Type": "text/plain" }
        })
        .then(res => res.text())
        .catch(err => console.log("網路重試中..."));
    }

    function resetTestSystem() {
        clearInterval(timerInterval);
        if(liveChart) liveChart.destroy();
    }

    // ================= 後台核心邏輯 =================

    function fetchAdminData() {
        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = `<tr><td colspan="3">正在即時讀取最新資料庫...</td></tr>`;

        fetch(API_URL)
        .then(res => res.text())
        .then(text => {
            const data = JSON.parse(text);
            globalAdminData = data; 
            tbody.innerHTML = "";
            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3">目前尚無學生成績。</td></tr>`;
                return;
            }
            
            let displayData = [...data].reverse();

            displayData.forEach((row, index) => {
                let tr = document.createElement('tr');
                let originalIndex = data.length - 1 - index;
                tr.onclick = () => playStudentDemo(originalIndex); 
                
                tr.innerHTML = `
                    <td>${row.timestamp}</td>
                    <td>${row.number} 號</td>
                    <td style="color:#ffd43b; font-weight:bold;">${row.wpm} WPM</td>
                `;
                tbody.appendChild(tr);
            });
        }).catch(() => {
            tbody.innerHTML = `<tr><td colspan="3" style="color:#f87171;">讀取失敗。請確認後端設定是否正確。</td></tr>`;
        });
    }

    function playStudentDemo(index) {
        clearInterval(playbackInterval);
        document.getElementById('adminChartBox').style.display = "block";
        
        const student = globalAdminData[index];
        document.getElementById('chartTitle').textContent = `${student.number} 號同學 打字脈絡模擬播放 (該關速度：${student.wpm} WPM)`;

        const historyData = student.history || [0];
        
        if(playbackChart) playbackChart.destroy();
        const ctx = document.getElementById('adminPlaybackChart').getContext('2d');
        playbackChart = new Chart(ctx, {
            type: 'line',
            data: { labels: [0], datasets: [{ label: '即時 WPM', data: [0], borderColor: '#ffd43b', backgroundColor: 'rgba(255, 212, 59, 0.1)', fill: true, tension: 0.2 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0, max: 120 } } }
        });

        let currentTick = 1;
        playbackInterval = setInterval(() => {
            if (currentTick < historyData.length) {
                playbackChart.data.labels.push(currentTick + "秒");
                playbackChart.data.datasets[0].data.push(historyData[currentTick]);
                playbackChart.update();
                currentTick++;
            } else {
                clearInterval(playbackInterval);
            }
        }, 300); 
    }
</script>
</body>
</html>
